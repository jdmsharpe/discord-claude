# Claude model pricing and context-window catalog.
#
# Canonical source: https://docs.claude.com/en/docs/about-claude/pricing
# Cross-referenced against: https://github.com/pydantic/genai-prices/blob/main/prices/providers/anthropic.yml
# Last-verified: 2026-04-17
#
# Prices are USD per million tokens. The calculator derives cache-write cost
# as 2.0x the input price (1h TTL), and cache-read cost as 0.1x the input price.
#
# Override this file at runtime by setting CLAUDE_PRICING_PATH to an alternate
# YAML path — useful for pushing new pricing without a code release.

models:
  claude-mythos-preview:
    context_window: 200_000
    input_per_million: 25.0
    output_per_million: 125.0

  claude-opus-4-7:
    context_window: 1_000_000
    input_per_million: 5.0
    output_per_million: 25.0

  claude-opus-4-6:
    context_window: 1_000_000
    input_per_million: 5.0
    output_per_million: 25.0

  claude-opus-4-5:
    context_window: 200_000
    input_per_million: 5.0
    output_per_million: 25.0

  claude-opus-4-1:
    context_window: 200_000
    input_per_million: 15.0
    output_per_million: 75.0

  claude-sonnet-4-6:
    context_window: 1_000_000
    input_per_million: 3.0
    output_per_million: 15.0

  claude-sonnet-4-5:
    context_window: 200_000
    input_per_million: 3.0
    output_per_million: 15.0

  claude-haiku-4-5:
    context_window: 200_000
    input_per_million: 1.0
    output_per_million: 5.0

tools:
  web_search:
    per_request: 0.01  # $10 per 1,000 searches

# Fallback applied when calculate_cost() receives an unknown model id.
unknown_model_fallback:
  input_per_million: 15.0
  output_per_million: 75.0
